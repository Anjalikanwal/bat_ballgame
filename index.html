<html lang="en">

<body>
    <div id="container">
        <h1 >Bat Ball Stump Game</h1>
        <div id="button_container">
            <button class="button" onclick=" 
            var Comp_choice= generate_comp_choice();
            var result=  comparison ('bat', Comp_choice); 
            display('bat' , Comp_choice, result);
            "> Bat</button>
           
            <button class="button" onclick="
          var Comp_choice= generate_comp_choice();
          var result=  comparison ('ball', Comp_choice);
         display('ball' , Comp_choice, result);
        "> Ball</button>
 

        <button class="button"
        onclick = "
            let Comp_choice= generate_comp_choice();
            let result=  comparison ('stump', Comp_choice);
            display('stump' , Comp_choice, result);
            "> Stump</button>
        </div>
    </div>

<script src="index.js"></script>
